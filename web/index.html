<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Downloader</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0c10;
        --card: #141823;
        --text: #eef1ff;
        --muted: #aab2d5;
        --accent: #6ea8fe;
        --border: rgba(255, 255, 255, 0.12);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f7fb;
          --card: #ffffff;
          --text: #111827;
          --muted: #6b7280;
          --accent: #2563eb;
          --border: rgba(0, 0, 0, 0.12);
        }
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 860px;
        margin: 40px auto;
        padding: 0 16px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 20px;
      }
      p {
        margin: 0 0 16px;
        color: var(--muted);
      }
      label {
        display: block;
        font-size: 13px;
        color: var(--muted);
        margin: 14px 0 6px;
      }
      input, select {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        outline: none;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 220px;
        gap: 12px;
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-top: 16px;
        flex-wrap: wrap;
      }
      button {
        border: 1px solid var(--border);
        background: rgba(110, 168, 254, 0.15);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 12px;
        cursor: pointer;
      }
      button.primary {
        background: var(--accent);
        border-color: rgba(0,0,0,0);
        color: white;
      }
      button.save {
        background: #22c55e;
        border-color: rgba(0,0,0,0);
        color: white;
        font-weight: 600;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .status {
        margin-top: 14px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        color: var(--muted);
        white-space: pre-wrap;
      }
      .hint {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }
      @media (max-width: 720px) {
        .row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>YouTube Downloader</h1>
        <p>Enter a YouTube URL, choose an output folder, pick a resolution (or keep best), then download.</p>

        <label for="url">YouTube URL</label>
        <input id="url" placeholder="https://www.youtube.com/watch?v=..." />

        <label for="out">Target path (directory)</label>
        <input id="out" value="Vid" placeholder="Vid" />
        <div class="hint">Tip: relative paths are relative to where you start the server.</div>

        <div class="row">
          <div>
            <label for="res">Resolution</label>
            <select id="res">
              <option value="">Best available (default)</option>
            </select>
          </div>
          <div>
            <label>&nbsp;</label>
            <button id="fetch">Load resolutions</button>
          </div>
        </div>

        <label for="proxyMode">Network / Proxy</label>
        <select id="proxyMode">
          <option value="auto" selected>Auto (use environment proxy if set)</option>
          <option value="direct">Direct (no proxy)</option>
          <option value="custom">Custom proxy URL</option>
        </select>
        <div class="hint">If you see “CONNECT tunnel failed: 403”, try “Direct (no proxy)”.</div>
        <label for="proxyUrl">Custom proxy URL (optional)</label>
        <input id="proxyUrl" placeholder="http://proxy:8080 or socks5://proxy:1080" />

        <div class="actions">
          <button class="primary" id="download" disabled>Download</button>
          <button id="selftest" disabled>Self-test</button>
          <button id="check" disabled>Check status</button>
          <a id="savebtn" style="display:none">
            <button class="save">⬇ Save to my computer</button>
          </a>
        </div>

        <div class="status" id="status"></div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const statusEl = $("status");
      const urlEl = $("url");
      const outEl = $("out");
      const resEl = $("res");
      const proxyModeEl = $("proxyMode");
      const proxyUrlEl = $("proxyUrl");
      const fetchBtn = $("fetch");
      const dlBtn = $("download");
      const selfTestBtn = $("selftest");
      const checkBtn = $("check");
      const saveBtn = $("savebtn");

      let jobId = null;

      function setStatus(msg) {
        statusEl.textContent = msg || "";
      }

      function ensureUrl() {
        const url = urlEl.value.trim();
        if (!url) throw new Error("Please enter a YouTube URL.");
        return url;
      }

      async function loadResolutions() {
        const url = ensureUrl();
        setStatus("Fetching formats…");
        dlBtn.disabled = true;

        const proxyMode = proxyModeEl.value;
        const proxyUrl = proxyUrlEl.value.trim();
        const qs = new URLSearchParams({ url, proxy_mode: proxyMode });
        if (proxyMode === "custom" && proxyUrl) qs.set("proxy_url", proxyUrl);
        const r = await fetch(`/api/formats?${qs.toString()}`);
        const data = await r.json();
        if (!r.ok) throw new Error(data?.detail || "Failed to fetch formats.");

        // reset options
        resEl.innerHTML = `<option value="">Best available (default)</option>`;
        for (const h of (data.heights || [])) {
          const opt = document.createElement("option");
          opt.value = String(h);
          opt.textContent = `${h}p`;
          resEl.appendChild(opt);
        }

        setStatus(`Title: ${data.title || "(unknown)"}\nAvailable heights: ${(data.heights || []).join(", ") || "(none)"}`);
        dlBtn.disabled = false;
      }

      async function startDownload() {
        return await startJob("/api/download");
      }

      async function startSelfTest() {
        outEl.value = outEl.value.trim() || "Vid";
        resEl.value = ""; // best
        return await startJob("/api/self-test");
      }

      async function startJob(endpoint) {
        const url = ensureUrl();
        const output_dir = outEl.value.trim() || "Vid";
        const height = resEl.value ? Number(resEl.value) : null;
        const proxy_mode = proxyModeEl.value;
        const proxy_url = proxyUrlEl.value.trim() || null;
        setStatus(endpoint === "/api/self-test" ? "Running self-test (download + verify)…" : "Starting download…");
        dlBtn.disabled = true;
        selfTestBtn.disabled = true;
        saveBtn.style.display = "none";

        const r = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url, output_dir, height, proxy_mode, proxy_url }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data?.detail || "Failed to start download.");

        jobId = data.id;
        checkBtn.disabled = false;
        setStatus(`Job started: ${jobId}\nState: ${data.state}\nMessage: ${data.message || ""}\n\nDownloading… this may take a while for large videos.`);

        // Auto-poll until done (up to 60 minutes).
        for (let i = 0; i < 3600; i++) {
          await new Promise((res) => setTimeout(res, 2000));
          const done = await checkStatus(false);
          if (done) break;
        }
      }

      async function checkStatus(silent=false) {
        if (!jobId) return false;
        const r = await fetch(`/api/jobs/${jobId}`);
        const data = await r.json();
        if (!r.ok) throw new Error(data?.detail || "Failed to get status.");

        const msg = `Job: ${data.id}\nState: ${data.state}\nMessage: ${data.message || ""}\nOutput dir: ${data.output_dir || ""}\nOutput file: ${data.output_file || ""}`;
        if (!silent) setStatus(msg);

        if (data.state === "done") {
          dlBtn.disabled = false;
          selfTestBtn.disabled = false;
          // Show the save button so the user can download the file to their browser
          saveBtn.href = `/api/download-file/${jobId}`;
          saveBtn.style.display = "inline";
          return true;
        }
        if (data.state === "error") {
          dlBtn.disabled = false;
          selfTestBtn.disabled = false;
          saveBtn.style.display = "none";
          return true;
        }
        return false;
      }

      fetchBtn.addEventListener("click", async () => {
        try { await loadResolutions(); }
        catch (e) { setStatus(String(e.message || e)); dlBtn.disabled = false; }
      });

      dlBtn.addEventListener("click", async () => {
        try { await startDownload(); }
        catch (e) { setStatus(String(e.message || e)); dlBtn.disabled = false; selfTestBtn.disabled = false; }
      });

      selfTestBtn.addEventListener("click", async () => {
        try { await startSelfTest(); }
        catch (e) { setStatus(String(e.message || e)); dlBtn.disabled = false; selfTestBtn.disabled = false; }
      });

      checkBtn.addEventListener("click", async () => {
        try { await checkStatus(false); }
        catch (e) { setStatus(String(e.message || e)); }
      });

      function setButtonsEnabledFromUrl() {
        const hasUrl = !!urlEl.value.trim();
        dlBtn.disabled = !hasUrl;
        selfTestBtn.disabled = !hasUrl;
      }

      urlEl.addEventListener("input", () => { setButtonsEnabledFromUrl(); });
      setButtonsEnabledFromUrl();
    </script>
  </body>
</html>
